
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቪዲዮ ኤዲቲንግ ፖርትፎሊዮ</title>
    <style>
        /* የዌብሳይቱ አጠቃላይ ገጽታ (Theme) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* ጥቁር ዳራ */
            color: #ffffff; /* ነጭ ጽሑፍ */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* ዋናው የይዘት ሳጥን */
        .container {
            max-width: 800px;
            padding: 40px 20px;
            background: #1e1e1e; /* ጥቁር ሳምባኖ ሳጥን */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-top: 5px solid #ff4757; /* ቀይ መስመር ለቪዲዮ ኤዲቲንግ ስሜት */
        }

        /* አርዕስቶች */
        h1 {
            color: #ff4757; /* ቀይ ቀለም */
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        h2 {
            color: #ffa502; /* ብርቱካናማ ቀለም */
            margin-top: 40px;
            font-size: 1.8rem;
        }

        p {
            font-size: 1.2rem;
            color: #ced6e0;
            line-height: 1.6;
        }

        /* የአገልግሎቶች ዝርዝር */
        ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        li {
            background: #2f3542;
            padding: 15px 25px;
            border-radius: 8px;
            width: 80%;
            font-size: 1.1rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        /* ማውዙን ሲያስጠጉበት የሚኖረው እንቅስቃሴ */
        li:hover {
            transform: scale(1.05);
            background: #ff4757;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ሰላም! እኔ ፕሮፌሽናል ቪዲዮ ኤዲተር ነኝ</h1>
        <p>ማራኪ እና ጥራት ያላቸውን ቪዲዮዎች እሰራለሁ።</p>
        
        <hr style="border: 0; height: 1px; background: #333; margin: 30px 0;">

        <h2>የምንሰጣቸው አገልገሎቶች </h2>
        <ul>
            <li>📺 YouTube and TikTok Video Editing</li>
            <li>📢 የሶሻል ሚዲያ ማስታወቂያዎች</li>
            <li>🎨 የቀለም እርማት (Color Grading)</li>
        </ul>
    </div>

</body>
</html>
