<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቪዲዮ ኤዲቲንግ ፖርትፎሊዮ</title>
    
    <!-- 🌐 ይሄ ሊንክ ትክክለኛዎቹን የቴሌግራም እና ዩቲዩብ አይከኖች ያመጣልናል -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12; 
            color: #ffffff; 
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 650px;
            width: 90%;
            padding: 40px 20px;
            background: #18181c; 
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            border-top: 6px solid #ff4757; 
        }

        h1 {
            color: #ff4757; 
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        h2 {
            color: #ffa502; 
            margin-top: 35px;
            font-size: 1.6rem;
        }

        p {
            font-size: 1.1rem;
            color: #a4b0be;
            line-height: 1.6;
        }

        ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-top: 20px;
        }

        li {
            background: #23232a;
            padding: 14px 20px;
            border-radius: 10px;
            width: 85%;
            font-size: 1.05rem;
            border-left: 4px solid #ff4757;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px; /* በአይከኑ እና በጽሑፉ መካከል ያለው ርቀት */
            transition: all 0.3s ease;
        }

        .btn i {
            font-size: 1.3rem; /* የአይከኑ መጠን */
        }

        .btn-telegram {
            background-color: #0088cc;
        }
        .btn-telegram:hover {
            background-color: #00a2f2;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4);
            transform: translateY(-2px);
        }

        .btn-youtube {
            background-color: #ff0000;
        }
        .btn-youtube:hover {
            background-color: #ff3333;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ሰላም! እኔ ፕሮፌሽናል ቪዲዮ ኤዲተር ነኝ</h1>
        <p>ማራኪ እና ጥራት ያላቸውን ቪዲዮዎች እሰራለሁ።</p>
        
        <hr style="border: 0; height: 1px; background: #2d2d35; margin: 25px 0;">

        <h2>የምሰጣቸው አገልግሎቶች</h2>
        <ul>
            <li>📺 YouTube and TikTok Video Editing</li>
            <li>📢 የሶሻል ሚዲያ ማስታወቂያዎች</li>
            <li>🎨 የቀለም እርማት (Color Grading)</li>
        </ul>

        <hr style="border: 0; height: 1px; background: #2d2d35; margin: 30px 0;">

        <h2>እኔን ለማግኘት</h2>
        <div class="social-buttons">
            <!-- ✈️ እውነተኛው የቴሌግራም አይከን እዚህ ጋር ተጨምሯል -->
            <a href="https://t.me/your_username" target="_blank" class="btn btn-telegram">
                <i class="fab fa-telegram-plane"></i> Telegram ያግኙኝ
            </a>
            
            <!-- 🔴 እውነተኛው የዩቲዩብ አይከን እዚህ ጋር ተጨምሯል -->
            <a href="https://youtube.com/@your_channel" target="_blank" class="btn btn-youtube">
                <i class="fab fa-youtube"></i> YouTube ቻናሌ
            </a>
        </div>
    </div>
